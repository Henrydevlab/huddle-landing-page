<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>
  <meta name="title" content="Frontend Mentor | Huddle landing page with single introductory section">
  <meta name="description" content="Huddle re-imagines the way we build communities. Build connections with your fans through genuine discussion.">
  <meta name="author" content="Your Name Here">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.yourdomain.com/">
  <meta property="og:title" content="Frontend Mentor | Huddle landing page">
  <meta property="og:description" content="Huddle re-imagines the way we build communities. Build connections with your fans through genuine discussion.">
  <meta property="og:image" content="./images/desktop-design.jpg">

  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://www.yourdomain.com/">
  <meta property="twitter:title" content="Frontend Mentor | Huddle landing page">
  <meta property="twitter:description" content="Huddle re-imagines the way we build communities. Build connections with your fans through genuine discussion.">
  <meta property="twitter:image" content="./images/desktop-design.jpg">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;1,400&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page-wrapper">
    
    <header class="header">
      <div class="header__container">
        <img src="./images/logo.svg" alt="Huddle Logo" class="header__logo">
      </div>
    </header>

    <main class="hero">
      <div class="hero__container">
        
        <div class="hero__visual">
          <img src="./images/illustration-mockups.svg" alt="Desktop and mobile mockups of the Huddle interface" class="hero__image">
        </div>

        <div class="hero__content">
          <h1 class="hero__title">Build The Community Your Fans Will Love</h1>
          <p class="hero__text">
            Huddle re-imagines the way we build communities. You have a voice, but so does your audience. 
            Create connections with your users as you engage in genuine discussion.
          </p>
          <button class="hero__button btn" type="button">Register</button>
        </div>

      </div>
    </main>

    <footer class="footer">
      <div class="footer__container">
        
        <ul class="footer__socials" aria-label="Social media links">
          <li class="footer__social-item">
            <a href="#" class="footer__social-link" aria-label="Follow us on Facebook">
              <i class="fa-brands fa-facebook-f" aria-hidden="true"></i>
            </a>
          </li>
          <li class="footer__social-item">
            <a href="#" class="footer__social-link" aria-label="Follow us on Twitter">
              <i class="fa-brands fa-twitter" aria-hidden="true"></i>
            </a>
          </li>
          <li class="footer__social-item">
            <a href="#" class="footer__social-link" aria-label="Follow us on Instagram">
              <i class="fa-brands fa-instagram" aria-hidden="true"></i>
            </a>
          </li>
        </ul>

        <p class="attribution">
          Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener">Frontend Mentor</a>. 
          Coded by <a href="#">Your Name Here</a>.
        </p>

      </div>
    </footer>

  </div>

</body>
</html>
